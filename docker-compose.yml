x-airflow-common: &airflow-common
  image: apache/airflow:2.8.1
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mluser:mlpassword@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: 46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstg=
    AIRFLOW__WEBSERVER__SECRET_KEY: ml-monitoring-secret
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    MLFLOW_TRACKING_URI: http://mlflow:5000
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    POSTGRES_USER: mluser
    POSTGRES_PASSWORD: mlpassword
    POSTGRES_DB: mlmonitoring
    MLFLOW_MODEL_NAME: breast-cancer-model
  volumes:
    - ./dags:/opt/airflow/dags
    - ./monitoring:/opt/airflow/monitoring
    - airflow-logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: mlmonitoring
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./sql/init_airflow.sql:/docker-entrypoint-initdb.d/02_airflow.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d mlmonitoring"]
      interval: 5s
      retries: 10

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    command: >
      bash -c "pip install --quiet psycopg2-binary &&
      mlflow server
      --backend-store-uri postgresql://mluser:mlpassword@postgres/mlmonitoring
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'"
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ./api
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: mlmonitoring
      MLFLOW_MODEL_NAME: breast-cancer-model
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started

  dashboard:
    build:
      context: ./dashboard
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
      POSTGRES_DB: mlmonitoring
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname User
          --role Admin --email admin@example.com || true
      "
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-data:
  mlflow-artifacts:
  airflow-logs:
